	<meta name="Luma-icon"
        content="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path style='fill:#82D889;' d='M256,386.648c-25.6,0-49.434-7.062-70.621-21.186c-21.186-14.124-37.076-31.779-47.669-53.848 L31.779,128C9.71,167.724,0,210.979,0,256c0,64.441,21.186,120.055,62.676,167.724s93.572,75.917,155.366,85.628l74.152-128.883 C285.131,383.117,271.89,386.648,256,386.648'/><path style='fill:#E86438;' d='M175.669,150.069c23.834-18.538,50.317-26.483,80.331-26.483h219.807 c-22.952-38.841-53.848-67.09-92.69-89.159C344.276,11.476,301.903,0,256,0c-39.724,0-77.683,8.828-112.11,25.6 S76.8,67.09,53.848,98.869L128,220.69C135.062,192.441,151.834,168.607,175.669,150.069'/><path style='fill:#FCE056;' d='M492.579,159.779H344.276c25.6,25.6,43.255,59.145,43.255,96.221 c0,27.366-7.945,52.083-22.952,75.034L258.648,512c69.738-0.883,129.766-25.6,179.2-75.917S512,325.738,512,256 C512,223.338,506.703,188.91,492.579,159.779'/><path style='fill:#25B9E1;' d='M256,158.897c52.966,0,97.103,44.138,97.103,97.103S308.966,353.103,256,353.103 S158.897,308.966,158.897,256S203.034,158.897,256,158.897'/></svg>"	<style>
	<style>	
	* {
			box-sizing: border-box;
		}

		body {
			height: 100%;
			margin: 0px;
			display: flex;
			flex-direction: column;
		}

		nav {
			user-select: none;
		}

		iframe {
			flex: 1;
			width: calc(100vw - 6px);
			margin: 3px;
			border-radius: 5px;
			background-color: white;
			color: black;
		}

		.urlnav span {
			transform: translateY(3px) !important;
		}

		nav .tab {
			display: inline-flex;
			width: 200px;
			padding: 3px 6px;
			background: transparent;
			margin: 3px;
			margin-bottom: 2px;
			border: none;
			transition: .3s;
			border-radius: 5px;
		}

		#tabconts {
			display: flex;
			flex-direction: column;
			flex: 1;
		}

		nav .active {
			background: var(--col-bg2);
			margin: 3px;
			margin-bottom: 2px;
			border: none;
			display: flex;
			align-items: center;
			flex-direction: row;
		}

		.urlnav {
			margin: 3px;
			margin-top: 0;
			display: block;
			background: var(--col-bg2);
			border-radius: 0 5px 5px 5px;
		}

		.urlnav .inpgrp {
			width: calc(100% - 140px);
			background: var(--col-bg1);
			border-radius: 25px;
			padding: 1px 4px;
			margin: 3px 0;
		}

		.urlnav .inpgrp input {
			background: transparent;
			border: none;
			font-size: 13px;
			color: var(--col-txt1);
			outline: none;
			transform: translateY(-2px);
		}

		.urlnav .inpgrp input {
			width: calc(100% - 100px);
			text-overflow: ellipsis;
			overflow: hidden;
		}

		.btngrp button {
			background: transparent;
			color: var(--col-txt1);
			border: none;
		}

		.urlnav * {
			display: inline-block;
		}

		.btngrp button span {
			font-size: 18px;
		}

		.inpgrp button {
			background: transparent;
			border: none;
			color: var(--col-txt1);
		}

		.inpgrp [right] {
			float: right;
		}

		.inpgrp button span {
			font-size: 18px;
		}

		.tabs {
			display: flex;
			flex-wrap: nowrap;
			flex-direction: row;
			overflow-x: auto;
		}

		.newtbtn {
			font-size: 15px !important;
			padding: 5px;
			background: transparent;
			border-radius: 10px;
			cursor: pointer;
			background: var(--col-bg2);
		}

		.newtbtn:hover {
			background: var(--col-bg2);
		}

		.clbtn {
			font-size: 13px !important;
			padding: 5px;
			background: transparent;
			border-radius: 50%;
			transform: translate(4px, 1px) !important;
			cursor: pointer;
			float: right;
			opacity: 0.5;
		}

		.clbtn:hover {
			opacity: 1;
		}

		.tab b {
			font-weight: normal;
			display: inline-block;
			overflow: hidden;
			flex: 1;
			text-overflow: ellipsis;
			white-space: nowrap;
			font-size: 10px;
			opacity: 0.5;
			padding: 0.2rem;
		}

		.tabcontent {
			flex: 1;
			display: flex;
		}

		#History {
			width: 50vw;
			max-width: 390px;
			border: none;
			border-radius: 5px;
			background: #363636;
			padding: 10px;
			max-height: calc(100vh - 135px);
			color: var(--col-txt1);
			margin-right: 10px;
			margin-top: 84px;
			box-shadow: 0 3px 5px #0000007d;
		}

		#History .bigt {
			border-bottom: 1px solid grey;

			background: #616161;
		}

		.tabsnav {
			display: flex;

			align-items: center;
			margin-right: 5px;
		}

		.historyitem span {
			flex: 1;
			overflow: hidden;
			font-size: 1rem;
			white-space: nowrap;
			text-overflow: ellipsis;
		}

		.historyitem button {
			padding: 1px;
			border: none;
			background: transparent;
			color: var(--col-txt1);
		}

		.historyitem button span {
			font-size: 1rem !important;
		}
	</style>

</head>

<body>

	<nav>
		<div class="tabsnav">
			<script>

			</script>
			<div class="tabs" id="tabs">
			</div>
			<span class="material-symbols-rounded newtbtn" onclick="newtab()">
				add
			</span>
		</div>
		<div class="urlnav">
			<div class="btngrp">
				<button onclick="homebtn()">
					<span class="material-symbols-rounded">
						home
					</span>
				</button>
				<button>
					<span class="material-symbols-rounded" onclick="reloadp()">
						refresh
					</span>
				</button>
			</div>
			<div class="inpgrp">
				<button>
					<span class="material-symbols-rounded">
						https
					</span>
				</button>
				<input placeholder="Search or enter web address" autocapitalize="off" autocomplete="off"
					onkeyup="isitago(event)" id="deinput" onclick="this.select()">
				<button right onclick="readnfa()">
					<span class="material-symbols-rounded">
						record_voice_over
					</span>
				</button>
				<button right>
					<span class="material-symbols-rounded">
						star_border
					</span>
				</button>
			</div>
			<div class="btngrp">
				<button onclick="historytabopen()">
					<span class="material-symbols-rounded">
						history
					</span>
				</button>
				<button>
					<span class="material-symbols-rounded" onclick="switchproxy()">
						lan

	</nav>
	<dialog id="History">
		<span class="bigt">History</span>
		<div id="historyitems">
			<div class="historyitem">
				<span>URL appears here</span>
				<button><span class="material-symbols-rounded">
						close
					</span></button>
			</div>
		</div>
	</dialog>
	<div id="tabconts">

	</div>

	<script>
		var tabhistory = [];
		var tabsnow = [];
		var lasttab = '';
		var nowtab = '';
		var deftab, proxy = false;
		var proxyurl = "";

		function switchproxy() {
			let x = prompt("Enter a new Proxy URL (with query params)");
			if (x) {
				proxyurl = x;
			}
		}

		function reloadp() {
			document.getElementById("ifr" + nowtab).contentDocument.location.reload(true);
		}

		function homebtn() {
			safeNavigateIframe(document.getElementById("ifr" + nowtab), "https://google.com/");
		}

		var myDialog = document.getElementById('History');

		document.addEventListener('click', (event) => {
			if (event.target === myDialog) {
				myDialog.close();
			}
		});

		function historytabopen() {
			let historyitemsele = document.getElementById("historyitems");
			historyitemsele.innerHTML = "";
			document.getElementById("History").showModal()
			tabhistory = [...new Set(tabhistory)];
			tabhistory.forEach(item => {
				const historyItemDiv = document.createElement('div');
				historyItemDiv.className = 'historyitem';

				historyItemDiv.onclick = function () {
					newtab(item);
					document.getElementById("History").close()
				}

				const urlSpan = document.createElement('span');
				urlSpan.textContent = item;

				const closeButton = document.createElement('button');
				const closeIcon = document.createElement('span');
				closeIcon.className = 'material-symbols-rounded';
				closeIcon.textContent = 'close';
				closeButton.appendChild(closeIcon);

				// Append elements to history item div
				historyItemDiv.appendChild(urlSpan);
				historyItemDiv.appendChild(closeButton);

				// Append history item div to the history items container
				document.getElementById('historyitems').appendChild(historyItemDiv);
			})
		}

		function openCity(evt, cityName) {
			lasttab = nowtab
			nowtab = evt.substring(4);
			var i, tabcontent, tablinks;
			tabcontent = document.getElementsByClassName("tabcontent");
			for (i = 0; i < tabcontent.length; i++) {
				if (tabcontent[i]) {
					tabcontent[i].style.display = "none";
				}
			}
			tablinks = document.getElementsByClassName("tab");
			for (i = 0; i < tablinks.length; i++) {
				tablinks[i].className = tablinks[i].className.replace(" active", "");
			}
			try {
				var iframe = document.querySelector("#ifr" + nowtab + "");
				if (iframe && iframe.contentWindow && iframe.contentWindow.location && iframe.contentWindow.location.href) {

					const originalOpen = window.open;
					window.open = function (url, target, features) {
						// Open in new LumaOS browser tab instead of external browser
						newtab(url);
						return null;
					};

					iframe.contentWindow.window.open = window.open;
					document.getElementById("deinput").value = iframe.contentWindow.location.href;

				}
			} catch (error) {
				console.log(`safe error: ${error.message.includes("cross-origin ") ? () => {
					"CORS error";
					document.getElementById("deinput").value = "#cors-enabled"
				} : error}`);

			}

			document.getElementById(cityName).style.display = "flex";
			document.getElementById(evt).className += " active";
		}

		function remtab(obj) {
			document.getElementById('tabn' + obj).remove()
			document.getElementById('wincs' + obj).remove()
			let index = tabsnow.indexOf(obj);
			if (index !== -1) {
				tabsnow.splice(index, 1);
			}
			openCity(lasttab, 'wincs' + nowtab)
		}
		let navigationTimer = null;

		function safeNavigateIframe(iframe, newSrc) {
			if (navigationTimer) clearTimeout(navigationTimer);

			navigationTimer = setTimeout(async () => {
				try {
					if (newSrc.startsWith("blob:")) {
						iframe.src = newSrc;
						return;
					}

					// Use X-Frame-Bypass for external URLs
					if (iframe.hasAttribute("is") && iframe.getAttribute("is") === "x-frame-bypass") {
						// For X-Frame-Bypass, just set the src directly
						iframe.src = newSrc;
						return;
					}

					const response = await fetch(newSrc);
					let html = await response.text();

					html = html.replace(/(src|href)=["']([^"']+)["']/g, (match, attr, url) => {
						if (!url.startsWith('http') && !url.startsWith('//')) {
							return `${attr}="${new URL(url, newSrc).href}"`;
						}
						return match;
					});

					const blob = new Blob([html], { type: 'text/html' });
					iframe.src = URL.createObjectURL(blob);

				} catch (error) {
					console.error("Failed to fetch iframe content:", error);
				}
			}, 100);
		}


		function newtab(src) {
			let nowid = genID();
			tabsnow.push(nowid)
			var df = document.createElement("div");
			df.setAttribute("class", "tabcontent");
			df.id = "wincs" + nowid;
			var bf = document.createElement("iframe");
			bf.setAttribute("is", "x-frame-bypass");

			bf.onerror = function (error) {
				console.error("An error occurred while loading the iframe due to CORS restrictions: ", error);
			};

			const SANDBOX = [
				"allow-scripts",
				"allow-same-origin",
				"allow-modals",
				"allow-forms",
				"allow-popups",
				"allow-presentation",
				"allow-pointer-lock"
			];

			const featurePolicy = {
				"fullscreen": "*",
				"autoplay": "*",
				"clipboard-write": "*",
				"encrypted-media": "*",
				"picture-in-picture": "*",
				"web-share": "*",
				"microphone": "*",
				"camera": "*",
				"geolocation": "*",
				"midi": "*",
				"accelerometer": "*",
				"gyroscope": "*",
				"magnetometer": "*",
				"payment": "*",
				"ambient-light-sensor": "*",
				"speaker": "*",
				"vibration": "*",
				"pointer-lock": "*"
			};
			
			bf.setAttribute("sandbox", SANDBOX.join(" "));
			bf.setAttribute(
				"allow",
				Object.entries(featurePolicy)
					.map(([name, permission]) => `${name} ${permission}`)
					.join("; ")
			);
			bf.style.zoom = "0.8"
			bf.setAttribute("allowtransparency", "true");
			bf.setAttribute("frameborder", 0);

			bf.onload = () => {
				if (src) {
					if (bf.src !== src) {
						safeNavigateIframe(bf, src)
					}
				} else {
					safeNavigateIframe(bf, "https://google.com/");
				}
				bf.onload = null;
				
				// Auto-focus iframe for keyboard capture
				setTimeout(() => {
					bf.focus();
					bf.contentWindow?.focus();
				}, 100);
			};

			if (typeof tabhistory !== 'undefined' && typeof src !== 'undefined') {
				tabhistory.push(src);
			}

			bf.id = "ifr" + nowid;
			df.appendChild(bf);

			// Add click to focus for keyboard capture
			bf.addEventListener('click', () => {
				bf.focus();
				bf.contentWindow?.focus();
			});

			// Redirect all keyboard events to iframe
			document.addEventListener('keydown', (e) => {
				if (document.activeElement === bf || bf.contains(document.activeElement)) {
					// Create a new keyboard event and dispatch it to iframe
					const clonedEvent = new KeyboardEvent(e.type, {
						key: e.key,
						code: e.code,
						location: e.location,
						ctrlKey: e.ctrlKey,
						shiftKey: e.shiftKey,
						altKey: e.altKey,
						metaKey: e.metaKey,
						repeat: e.repeat,
						bubbles: true,
						cancelable: true
					});
					bf.contentWindow?.dispatchEvent(clonedEvent);
				}
			});

			document.addEventListener('keyup', (e) => {
				if (document.activeElement === bf || bf.contains(document.activeElement)) {
					const clonedEvent = new KeyboardEvent(e.type, {
						key: e.key,
						code: e.code,
						location: e.location,
						ctrlKey: e.ctrlKey,
						shiftKey: e.shiftKey,
						altKey: e.altKey,
						metaKey: e.metaKey,
						bubbles: true,
						cancelable: true
					});
					bf.contentWindow?.dispatchEvent(clonedEvent);
				}
			});

			// Hide fullscreen messages when pointer is locked
			bf.addEventListener('load', () => {
				try {
					bf.contentDocument?.addEventListener('pointerlockchange', () => {
						const isLocked = bf.contentDocument.pointerLockElement !== null;
						if (isLocked) {
							// Hide fullscreen messages
							const fullscreenMessages = bf.contentDocument.querySelectorAll('[class*="fullscreen"], [class*="full-screen"], [id*="fullscreen"], [id*="full-screen"]');
							fullscreenMessages.forEach(el => {
								el.style.display = 'none';
							});
							
							// Also hide common fullscreen notification elements
							const notifications = bf.contentDocument.querySelectorAll('.notification, .alert, .toast, .message');
							notifications.forEach(el => {
								if (el.textContent && (
									el.textContent.toLowerCase().includes('plein écran') ||
									el.textContent.toLowerCase().includes('fullscreen') ||
									el.textContent.toLowerCase().includes('appuyez') ||
									el.textContent.toLowerCase().includes('press')
								)) {
									el.style.display = 'none';
								}
							});
						}
					});
				} catch (e) {
					// Cross-origin, can't access iframe
				}
			});

			document.getElementById("tabconts").appendChild(df);

			var d = document.createElement("div");
			d.setAttribute("class", "tab");
			let olo = nowid;
			d.id = 'tabn' + olo

			var b = document.createElement("b");
			b.textContent = nowid;
			b.setAttribute("onclick", "openCity('" + d.id + "','wincs" + nowid + "')");
			d.appendChild(b);
			var s = document.createElement("span");
			s.setAttribute("class", "material-symbols-rounded clbtn");
			s.textContent = "close";
			s.setAttribute("onclick", "remtab('" + olo + "')");
			d.appendChild(s);
			document.getElementById("tabs").appendChild(d);
			let cff = 'wincs' + nowid;
			openCity(d.id, cff)
		}

		function genID() {
			const characters = 'abcdefghijklmnopqrstuvwxyz';
			let result = '';
			for (let i = 0; i < 8; i++) {
				result += characters.charAt(Math.floor(Math.random() * characters.length));
			}
			return result;
		}

		async function isitago(eve) {
			if (eve.key === "Enter") {
				eve.preventDefault();
				const input = document.getElementById("deinput").value;
				const [isValid, validatedUrl] = isValidURL(input);
				let finalUrl = isValid ? validatedUrl : ``;

				try {
					const qsets = await ntxSession.send("settings.get","defSearchEngine");
					if (qsets && !isValid) {
						if (qsets === "Bing") {
							finalUrl = `https://www.bing.com/search?q=${encodeURIComponent(input)}`;
						}
					}
				} catch (error) {
					console.log(`safe error: ${error.message.includes("cross-origin") ? "CORS error" : error}`);
				}

				console.log(input, finalUrl, isValid, nowtab);

				if (typeof proxy !== "undefined" && proxy) {
					const proxyUrl = `${proxyurl}${encodeURIComponent(finalUrl)}`;
					fetch(proxyUrl)
						.then(response => {
							if (!response.ok) {
								throw new Error(`HTTP error! Status: ${response.status}`);
							}
							return response.json();
						})
						.then(data => {
							if (data.contents) {
								const blob = new Blob([data.contents], { type: "text/html" });
								const url = URL.createObjectURL(blob);
								document.getElementById("ifr" + nowtab).src = url;
							} else {
								throw new Error("Invalid contents received from proxy.");
							}
						})
						.catch(error => console.error(`Error fetching the resource (Proxy URL: ${proxyUrl}):`, error));
				} else {
					document.getElementById("ifr" + nowtab).src = finalUrl;
				}

				tabhistory.push(finalUrl);
			}
		}

		function truncateMiddle(str, frontChars, backChars, maxLength) {
			if (str.length <= maxLength) {
				return str;
			}
			return str.substring(0, frontChars) + '...' + str.substring(str.length - backChars);
		}

		function isValidURL(str) {
			let url = str;
			let urlPattern = /^(ftp|http|https):\/\/[^ "]+$/;

			if (!str.includes(" ") && str.includes(".")) {
				isvalid = true;
				if (!urlPattern.test(url)) {
					url = "https://" + str;
				}
			} else {
				isvalid = false;
			}

			return [isvalid, url];
		}

		function readnfa() {
			// Access the iframe document
			var iframeDocument;
			try {
				iframeDocument = document.getElementById('ifr' + nowtab).contentWindow.document;
			} catch (error) {
				alert("Can't read this document\n\n Unable to access the document due to CORS (Cross-Origin Resource Sharing) policy.");
				return;
			}

			// Get all text nodes within the iframe
			var walker = document.createTreeWalker(
				iframeDocument.body,
				NodeFilter.SHOW_TEXT,
				null,
				false
			);

			// Initialize an empty string to store the text content
			var iframeTextContent = '';

			// Iterate over each text node and append its text content
			while (walker.nextNode()) {
				var node = walker.currentNode;
				// Skip empty or var(--col-txt1)space-only text nodes
				if (node.textContent.trim() !== '') {
					iframeTextContent += node.textContent.trim() + ' ';
				}
			}

			// If there is nothing to read, show an alert
			if (iframeTextContent === '') {
				alert("Error: There is nothing to read.");
				return;
			}

			// Speak the text content aloud
			var synth = window.speechSynthesis;
			var utterance = new SpeechSynthesisUtterance(iframeTextContent);
			synth.speak(utterance);
		}

		async function greenflag() {
			tabsnow = [];
			nowtab = "";
			deftab = "";
			ntxSession = new NTXSession();

			var defile
			try {
				if (myWindow.params.appid == myWindow.appID) {
					defile = myWindow.params.data;
					const file = await ntxSession.send("fileGet.byId", defile);
					readthefile(file);
				} else {
					newtab();
				}
			} catch (e) {
				newtab();
			}

			const dropArea = document.getElementById('tabs');
			dropArea.addEventListener('dragover', function (e) {
				e.preventDefault();
			});

			// Handle drop event
			dropArea.addEventListener('drop', function (e) {
				e.preventDefault();
				if (e.dataTransfer.items) {
					for (let i = 0; i < e.dataTransfer.items.length; i++) {
						if (e.dataTransfer.items[i].kind === 'string' && e.dataTransfer.items[i].type === 'text/plain') {
							const droppedLink = e.dataTransfer.getData('text/plain');
							console.log('Link dropped:', droppedLink);
							newtab(droppedLink)
						}
					}
				}
			});
		}

		async function readthefile(file) {
			document.getElementById("deinput").value = file.path + file.fileName;
			const base64Data = file.content.split(',')[1];
			const byteCharacters = atob(base64Data);
			const byteNumbers = new Array(byteCharacters.length);
			for (let i = 0; i < byteCharacters.length; i++) {
				byteNumbers[i] = byteCharacters.charCodeAt(i);
			}
			const byteArray = new Uint8Array(byteNumbers);
			const blob = new Blob([byteArray], { type: 'text/html' });
			const blobUrl = URL.createObjectURL(blob);
			console.log(435, blobUrl)
			newtab(blobUrl);
		}

	</script>
